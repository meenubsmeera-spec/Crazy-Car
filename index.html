<!DOCTYPE html>
<html>
<head>
    <title>Crazy Car</title>

    <style>
        body{
            text-align:center;
            font-family:Arial,sans-serif;
            background-color:rgb(43,64,14);
        }

        .box{
            width:500px;
            height:500px;
            border:5px solid rgb(19,18,53);
            margin:20px auto;
            position:relative;
            background-color:rgb(72,21,65);
        }

        .road{
            position:absolute;
            top:50px;
            left:50px;
            width:400px;
            height:400px;
            border:40px solid gray;
            box-sizing:border-box;
        }

        .car{
            width:50px;
            height:50px;
            position:absolute;
            top:50px;
            left:50px;
            font-size:35px;
            cursor:pointer;
        }

        .tree{
            position:absolute;
            font-size:30px;
        }

        .traffic{
            position:absolute;
            font-size:30px;
        }

        .person{
            position:absolute;
            font-size:30px;
        }
    </style>
</head>

<body>

<h1>Come On 🚗</h1>

<h2>Timer: <span id="timer">00:00</span></h2>

<div class="box">

    <div class="road"></div>

    <div class="car" id="car">🚗</div>

    <div class="tree" style="top:10px;left:10px;">🌳</div>
    <div class="tree" style="top:10px;right:10px;">🌳</div>
    <div class="tree" style="bottom:10px;left:10px;">🌳</div>
    <div class="tree" style="bottom:10px;right:10px;">🌳</div>

    <div class="traffic" style="top:220px;left:5px;">🚦</div>

    <div class="person" style="top:220px;right:5px;">🚶</div>

</div>

<script>

let seconds = 0;
let timerDisplay = document.getElementById("timer");

let timerInterval = setInterval(updateTimer, 1000);

function updateTimer()
{
    let mins = Math.floor(seconds / 60);
    let secs = seconds % 60;

    timerDisplay.innerHTML =
        String(mins).padStart(2,'0') + ":" +
        String(secs).padStart(2,'0');

    seconds++;
}

let car = document.getElementById("car");

let x = 50;
let y = 50;

let direction = "right";

function moveCar()
{
    if(direction=="right")
    {
        x += 5;
        if(x >= 400) direction = "down";
    }
    else if(direction=="down")
    {
        y += 5;
        if(y >= 400) direction = "left";
    }
    else if(direction=="left")
    {
        x -= 5;
        if(x <= 50) direction = "up";
    }
    else if(direction=="up")
    {
        y -= 5;
        if(y <= 50) direction = "right";
    }

    car.style.left = x + "px";
    car.style.top = y + "px";
}

let interval = setInterval(moveCar,50);

car.addEventListener("mouseover", function()
{
    clearInterval(interval);      // stop car
    clearInterval(timerInterval); // stop timer
    car.style.transform = "scale(1.3)";
});

car.addEventListener("mouseout", function()
{
    interval = setInterval(moveCar,50);      // start car
    timerInterval = setInterval(updateTimer,1000); // start timer
    car.style.transform = "scale(1)";
});
</script>

</body>
</html>
